  <svg width="0" height="0" style="position: absolute;">
    <defs>
      <g id="ff-icon">
        <rect width="1024" height="1024" rx="230" fill="#333B46"></rect>
        <g fill="none" stroke="#FAF8F5" stroke-width="46" stroke-linecap="round" stroke-linejoin="round">

          <path d="M 532 462 L 676 462"></path>

      </g>

  <div style="display: flex; flex-direction: column; align-items: center; gap: 20px;">

  <div style="display: flex; align-items: flex-end; gap: 40px;">

      <div style="font-size: 11px; color: #8A8580; font-family: 'SF Mono', Menlo, monospace;">120</div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
      <svg viewBox="0 0 1024 1024" width="64" height="64" style="border-radius: 14px; box-shadow: 0 4px 12px rgba(40,46,56,0.18);"><use href="#ff-icon"></use></svg>
      <div style="font-size: 11px; color: #8A8580; font-family: 'SF Mono', Menlo, monospace;">64</div>
