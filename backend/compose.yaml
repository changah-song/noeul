services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: fluent-fable-backend

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    env_file:
      - .env

    environment:
      PORT: 8000

    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload